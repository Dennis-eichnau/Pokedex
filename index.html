<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokedex</title>
    <link rel="icon" type="image/x-icon" href="./assets/imgs/pokemon-loader.png">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="overlay.css" />
    <link rel="stylesheet" href="colors.css">
    <link rel="stylesheet" href="responsiv.css">
    <link rel="stylesheet" href="loader.css">
    <link rel="stylesheet" href="popup.css">
    <script src="script.js"></script>
    <script src="render.js"></script>
    <script src="template.js"></script>
  </head>
  <body id="body" onload="init()">

    <div id="loader" class="d_none loader"></div>

    <header>
      <input  onkeyup="searchPokemon()"  id="search" type="search" placeholder="Pokemon suchen..."  required >
      <div class="popup" onclick="popupSearchInput()">
      <span class="popuptext" id="myPopup">mind. 3 Buchstaben eingeben!! </span>
      </div>
    </header>

    <div id="overlay" onclick="pokemonOverlayOff()">
      <div id="overlay-content"></div>
    </div>

    <main id="pokemon"></main>

    <div class="btn-next-pokemon">
      <button id="btn" onclick="loadNextPokemon()" class="btn-next" >Weitere Pokemon Laden ...</button>
    </div>

    <footer></footer>
  </body>
</html>
